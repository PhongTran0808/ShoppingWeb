#
# This is the Apache server configuration file providing SSL support.
# It contains the configuration directives to instruct the server how to
# serve pages over an https connection. For detailed information about these 
# directives see <URL:http://httpd.apache.org/docs/2.4/mod/mod_ssl.html>
# 

# Required modules: mod_log_config, mod_setenvif, mod_ssl,
#                   socache_shmcb_module (for default value of SSLSessionCache)

#
# When we also provide SSL we have to listen to the 
# standard HTTP port (see above) and to the HTTPS port
#
Listen 443

##
##  SSL Global Context
##
##  All SSL configuration in this context applies both to
##  the main server and all SSL-enabled virtual hosts.
##

#   SSL Cipher Suite và Protocols cấu hình toàn cục (Hỗ trợ tốt cho TLSv1.2)
SSLCipherSuite ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256
SSLProxyCipherSuite ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256

SSLHonorCipherOrder on 

SSLProtocol all -SSLv3
SSLProxyProtocol all -SSLv3

#   Pass Phrase Dialog:
SSLPassPhraseDialog  builtin

#   Inter-Process Session Cache:
SSLSessionCache        "shmcb:${SRVROOT}/logs/ssl_scache(512000)"
SSLSessionCacheTimeout  300

##
## SSL Virtual Host Context
##

<VirtualHost *:443>
    # DocumentRoot "${SRVROOT}/htdocs"
    ServerName tienthienvienman.site.je:443
    ServerAdmin tuientu131@gmail.com
    ErrorLog "${SRVROOT}/logs/error_log"
    TransferLog "${SRVROOT}/logs/access_log"

    SSLEngine on

    # Cấu hình Mật mã chuẩn theo yêu cầu tài liệu hướng dẫn
    <IfDefine ENABLE_TLS13>
        # Enable only TLS 1.2 and TLS 1.3
        SSLProtocol -all +TLSv1.3 +TLSv1.2

        # TLS 1.2 ciphers only ECDHE-ECDSA
        SSLCipherSuite SSL ECDHE-ECDSA-AES256-GCM-SHA512:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-ECDSA-CHACHA20-POLY1305

        # TLS 1.3 ciphers modern only
        SSLCipherSuite TLSv1.3 TLS_AES_256_GCM_SHA512:TLS_AES_256_GCM_SHA384:TLS_AES_128_GCM_SHA256:TLS_CHACHA20_POLY1305_SHA256
    </IfDefine>

    SSLHonorCipherOrder on

    # Đường dẫn chứng chỉ của bạn
    SSLCertificateFile "${SRVROOT}/conf/ssl/certificate.crt"
    SSLCertificateKeyFile "${SRVROOT}/conf/ssl/tienthienvienman-private.pem"
    SSLCertificateChainFile "${SRVROOT}/conf/ssl/ca_bundle.crt"

    <Directory "${SRVROOT}/htdocs">
        Options Indexes FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    ProxyPreserveHost On

    # WebSocket proxy cho Next.js HMR (Hot Module Replacement)
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteRule /(.*)  ws://127.0.0.1:3000/$1 [P,L]

    # Swagger UI proxy (Catalog Service)
    ProxyPass /api/swagger-ui/ http://127.0.0.1:8081/swagger-ui/
    ProxyPassReverse /api/swagger-ui/ http://127.0.0.1:8081/swagger-ui/
    ProxyPass /v3/api-docs http://127.0.0.1:8081/v3/api-docs
    ProxyPassReverse /v3/api-docs http://127.0.0.1:8081/v3/api-docs

    # Microservices API Gateway Proxy
    ProxyPass /api/ http://127.0.0.1:8080/api/
    ProxyPassReverse /api/ http://127.0.0.1:8080/api/

    ProxyPass / http://127.0.0.1:3000/
    ProxyPassReverse / http://127.0.0.1:3000/

    BrowserMatch "MSIE [2-5]" \
             nokeepalive ssl-unclean-shutdown \
             downgrade-1.0 force-response-1.0

    CustomLog "${SRVROOT}/logs/ssl_request_log" \
              "%t %h %{SSL_PROTOCOL}x %{SSL_CIPHER}x \"%r\" %b"
</VirtualHost>