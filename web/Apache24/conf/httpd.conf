#
# This is the main Apache HTTP server configuration file.  It contains the
# configuration directives that give the server its instructions.
# See <URL:http://httpd.apache.org/docs/2.4/> for detailed information.
# In particular, see 
# <URL:http://httpd.apache.org/docs/2.4/mod/directives.html>
# for a discussion of each configuration directive.
#

#
# ServerRoot: Định nghĩa biến đường dẫn gốc của Apache trên ổ D
#
Define SRVROOT "D:/HKII-2026/MatMaUngDung/project/web/Apache24"
ServerRoot "${SRVROOT}"

# Define cấu hình bổ sung hỗ trợ TLSv1.3 theo yêu cầu đề bài
Define ENABLE_TLS13 "Yes"

#
# Listen: Cho phép Apache lắng nghe trên cổng 80 (HTTP) mặc định
#
Listen 80

#
# Dynamic Shared Object (DSO) Support
#
LoadModule access_compat_module modules/mod_access_compat.so
LoadModule auth_basic_module modules/mod_auth_basic.so
LoadModule authn_core_module modules/mod_authn_core.so
LoadModule authn_file_module modules/mod_authn_file.so
LoadModule authz_core_module modules/mod_authz_core.so
LoadModule authz_groupfile_module modules/mod_authz_groupfile.so
LoadModule authz_host_module modules/mod_authz_host.so
LoadModule authz_user_module modules/mod_authz_user.so

# Kích hoạt Socache phục vụ lưu bộ nhớ cache phiên làm việc cho cấu hình SSL
LoadModule socache_shmcb_module modules/mod_socache_shmcb.so

LoadModule filter_module modules/mod_filter.so
LoadModule reqtimeout_module modules/mod_reqtimeout.so
LoadModule autoindex_module modules/mod_autoindex.so
LoadModule mime_module modules/mod_mime.so
LoadModule log_config_module modules/mod_log_config.so
LoadModule alias_module modules/mod_alias.so
LoadModule dir_module modules/mod_dir.so
LoadModule env_module modules/mod_env.so
LoadModule headers_module modules/mod_headers.so
LoadModule setenvif_module modules/mod_setenvif.so
LoadModule version_module modules/mod_version.so
LoadModule proxy_module modules/mod_proxy.so
LoadModule proxy_http_module modules/mod_proxy_http.so
LoadModule proxy_wstunnel_module modules/mod_proxy_wstunnel.so
LoadModule rewrite_module modules/mod_rewrite.so

# Kích hoạt module mã hóa SSL để xử lý giao thức HTTPS
LoadModule ssl_module modules/mod_ssl.so

<IfModule unixd_module>
User daemon
Group daemon
</IfModule>

#
# ServerAdmin: Địa chỉ Email quản trị viên
#
ServerAdmin tuientu131@gmail.com

#
# ServerName: Tên định danh hoặc địa chỉ IP của Web Server cục bộ
#
ServerName 127.0.0.1:80

<VirtualHost *:80>
    ServerName tienthienvienman.site.je
    Redirect permanent / https://tienthienvienman.site.je/
</VirtualHost>

#
# Deny access to the entirety of your server's filesystem.
#
<Directory />
    AllowOverride none
    Require all denied
</Directory>

#
# DocumentRoot: Thư mục gốc chứa mã nguồn Website
#
DocumentRoot "${SRVROOT}/htdocs"
<Directory "${SRVROOT}/htdocs">
    Options Indexes FollowSymLinks
    AllowOverride None
    Require all granted
</Directory>

#
# DirectoryIndex: Thiết lập file mặc định chạy khi truy cập thư mục
#
<IfModule dir_module>
    DirectoryIndex index.html
</IfModule>

#
# The following lines prevent .htaccess and .htpasswd files from being viewed
#
<Files ".ht*">
    Require all denied
</Files>

#
# ErrorLog: Nhật ký ghi nhận lỗi của hệ thống
#
ErrorLog "logs/error_log"
LogLevel warn

<IfModule log_config_module>
    LogFormat "%h %l %u %t \"%r\" %>s %b \"%{Referer}i\" \"%{User-Agent}i\"" combined
    LogFormat "%h %l %u %t \"%r\" %>s %b" common

    <IfModule logio_module>
      LogFormat "%h %l %u %t \"%r\" %>s %b \"%{Referer}i\" \"%{User-Agent}i\" %I %O" combinedio
    </IfModule>

    CustomLog "logs/access_log" common
</IfModule>

<IfModule alias_module>
    ScriptAlias /cgi-bin/ "${SRVROOT}/cgi-bin/"
</IfModule>

<Directory "${SRVROOT}/cgi-bin">
    AllowOverride None
    Options None
    Require all granted
</Directory>

<IfModule headers_module>
    RequestHeader unset Proxy early
</IfModule>

<IfModule mime_module>
    TypesConfig conf/mime.types
    AddType application/x-compress .Z
    AddType application/x-gzip .gz .tgz
</IfModule>

# Secure (SSL/TLS) connections - Nhúng file cấu hình SSL mở rộng sang
Include conf/extra/httpd-ssl.conf

<IfModule ssl_module>
SSLRandomSeed startup builtin
SSLRandomSeed connect builtin
</IfModule>