input {
  tcp {
    port => 5000
    codec => json
  }
  
  http {
    port => 8080
    codec => json
  }
}

filter {
  # Parse JSON logs
  if [message] =~ /^\{.*\}$/ {
    json {
      source => "message"
    }
  }

  # Extract security events
  if [event_type] == "security" {
    mutate {
      add_tag => ["security_event"]
    }
  }

  # Extract fraud detection events
  if [event_type] == "fraud_detection" {
    mutate {
      add_tag => ["fraud_event"]
    }
  }

  # Parse timestamps
  date {
    match => ["timestamp", "ISO8601"]
    target => "@timestamp"
  }

  # Add geolocation for IP addresses
  if [ip_address] {
    geoip {
      source => "ip_address"
      target => "geoip"
    }
  }

  # Calculate risk scores
  if [risk_score] {
    ruby {
      code => "
        score = event.get('risk_score').to_f
        if score > 80
          event.set('risk_level', 'high')
        elsif score > 50
          event.set('risk_level', 'medium')
        else
          event.set('risk_level', 'low')
        end
      "
    }
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "ecommerce-logs-%{+YYYY.MM.dd}"
  }

  # High-risk events to separate index
  if "fraud_event" in [tags] or [risk_level] == "high" {
    elasticsearch {
      hosts => ["elasticsearch:9200"]
      index => "security-alerts-%{+YYYY.MM.dd}"
    }
  }

  # Console output for debugging
  stdout {
    codec => rubydebug
  }
}
