version: '3.8'

# SECURE DOCKER COMPOSE - Production-Ready Security Configuration
# Tập trung vào security hardening và container isolation

networks:
  # Secure internal network với custom subnet
  ecom-secure:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/16
          gateway: 172.30.0.1
    driver_opts:
      com.docker.network.bridge.enable_icc: "false"
      com.docker.network.bridge.enable_ip_masquerade: "true"
      com.docker.network.driver.mtu: "1500"

  # Public network for gateway only
  ecom-public:
    driver: bridge
    
  # Database network (isolated)
  ecom-database:
    driver: bridge
    internal: true

services:
  # === SECURITY INFRASTRUCTURE ===
  
  # HashiCorp Vault - Key Management Service
  vault:
    image: hashicorp/vault:1.15
    container_name: ecom-vault-secure
    security_opt:
      - no-new-privileges:true
      - apparmor:unconfined
    cap_drop:
      - ALL
    cap_add:
      - IPC_LOCK
      - SETUID
      - SETGID
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
      - /vault/logs:noexec,nosuid,size=50m
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: "${VAULT_ROOT_TOKEN:-changeme}"
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
      VAULT_LOG_LEVEL: "INFO"
      VAULT_CLUSTER_INTERFACE: "eth0"
      VAULT_REDIRECT_INTERFACE: "eth0"
    volumes:
      - vault_data:/vault/data:Z
      - vault_logs:/vault/logs:Z
      - ./init-scripts/init-vault.sh:/vault/init-vault.sh:ro
    ports:
      - "8200:8200"
    networks:
      - ecom-secure
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "vault", "status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Keycloak - Identity Provider (Hardened)
  keycloak:
    image: quay.io/keycloak/keycloak:23.0
    container_name: ecom-keycloak-secure
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=200m
      - /opt/keycloak/data/tmp:noexec,nosuid,size=100m
    environment:
      KEYCLOAK_ADMIN: "${KC_ADMIN_USER:-admin}"
      KEYCLOAK_ADMIN_PASSWORD: "${KC_ADMIN_PASSWORD:-SecureP@ssw0rd123}"
      KC_DB: mysql
      KC_DB_URL: "jdbc:mysql://mysql-secure:3306/keycloak_db?useSSL=true&requireSSL=true"
      KC_DB_USERNAME: "${KC_DB_USER:-kc_user}"
      KC_DB_PASSWORD: "${KC_DB_PASSWORD:-SecureKcP@ss123}"
      KC_HOSTNAME: "localhost"
      KC_HOSTNAME_PORT: "9090"
      KC_HTTP_RELATIVE_PATH: "/auth"
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
      KC_LOG_LEVEL: "INFO"
      KC_PROXY: "edge"
    ports:
      - "9090:8080"
    networks:
      - ecom-secure
      - ecom-database
    depends_on:
      mysql-secure:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/auth/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    command: ["start", "--optimized", "--import-realm"]
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # === DATABASE LAYER ===
  
  # MySQL Database (Security Hardened)
  mysql-secure:
    image: mysql:8.0.35
    container_name: ecom-mysql-secure
    security_opt:
      - no-new-privileges:true
      - apparmor:unconfined
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
      - DAC_OVERRIDE
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=200m
      - /var/run/mysqld:noexec,nosuid,size=100m
    environment:
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD:-SecureR00tP@ss123}"
      MYSQL_USER: "${MYSQL_USER:-ecom_secure_user}"
      MYSQL_PASSWORD: "${MYSQL_PASSWORD:-SecureUserP@ss123}"
      MYSQL_ROOT_HOST: "%"
    volumes:
      - mysql_data_secure:/var/lib/mysql:Z
      - mysql_logs:/var/log/mysql:Z
      - ./init-scripts/init-db-secure.sql:/docker-entrypoint-initdb.d/01-init-db.sql:ro
      - ./config/mysql/secure.cnf:/etc/mysql/conf.d/secure.cnf:ro
    ports:
      - "3306:3306"
    networks:
      - ecom-database
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-SecureR00tP@ss123}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    command: >
      --default-authentication-plugin=mysql_native_password
      --ssl-ca=/etc/mysql/ssl/ca.pem
      --ssl-cert=/etc/mysql/ssl/server-cert.pem
      --ssl-key=/etc/mysql/ssl/server-key.pem
      --require-secure-transport=ON
      --log-error=/var/log/mysql/error.log
      --slow-query-log=1
      --slow-query-log-file=/var/log/mysql/slow.log
      --long-query-time=2
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Redis (Secure Configuration)
  redis-secure:
    image: redis:7.2-alpine
    container_name: ecom-redis-secure
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=50m
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-SecureRedisP@ss123}
      --appendonly yes
      --appendfsync everysec
      --save 900 1
      --save 300 10
      --save 60 10000
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --timeout 300
      --tcp-keepalive 300
      --bind 0.0.0.0
      --protected-mode yes
    volumes:
      - redis_data:/data:Z
    ports:
      - "6379:6379"
    networks:
      - ecom-secure
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 30s
      timeout: 3s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  # === MICROSERVICES (Security Hardened) ===
  
  # API Gateway (Security Focused)
  gateway-secure:
    build:
      context: ./backend/gateway-service
      dockerfile: Dockerfile.security
    container_name: ecom-gateway-secure
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
    environment:
      SPRING_PROFILES_ACTIVE: "production,security"
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: "http://keycloak:8080/auth/realms/ecommerce-realm"
      SPRING_DATA_REDIS_HOST: "redis-secure"
      SPRING_DATA_REDIS_PORT: "6379"
      SPRING_DATA_REDIS_PASSWORD: "${REDIS_PASSWORD:-SecureRedisP@ss123}"
      VAULT_TOKEN: "${VAULT_ROOT_TOKEN:-changeme}"
      VAULT_HOST: "vault"
      VAULT_PORT: "8200"
      JAVA_OPTS: >
        -XX:+UseContainerSupport
        -XX:MaxRAMPercentage=75.0
        -XX:+UseG1GC
        -XX:+UnlockExperimentalVMOptions
        -XX:+UseCGroupMemoryLimitForHeap
        -Djava.security.egd=file:/dev/./urandom
        -Dcom.sun.management.jmxremote=false
    ports:
      - "8080:8080"
    networks:
      - ecom-public
      - ecom-secure
    depends_on:
      vault:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      redis-secure:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Catalog Service (Secure)
  catalog-secure:
    build:
      context: ./backend/catalog-service
      dockerfile: Dockerfile.security
    container_name: ecom-catalog-secure
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
    environment:
      SPRING_PROFILES_ACTIVE: "production,security"
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql-secure:3306/catalog_db?useSSL=true&requireSSL=true"
      SPRING_DATASOURCE_USERNAME: "${MYSQL_USER:-ecom_secure_user}"
      SPRING_DATASOURCE_PASSWORD: "${MYSQL_PASSWORD:-SecureUserP@ss123}"
      VAULT_TOKEN: "${VAULT_ROOT_TOKEN:-changeme}"
      VAULT_HOST: "vault"
      JAVA_OPTS: >
        -XX:+UseContainerSupport
        -XX:MaxRAMPercentage=75.0
        -Djava.security.egd=file:/dev/./urandom
    networks:
      - ecom-secure
      - ecom-database
    depends_on:
      mysql-secure:
        condition: service_healthy
      vault:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Order Service (Transaction Security Focused)
  order-secure:
    build:
      context: ./backend/order-service
      dockerfile: Dockerfile.security
    container_name: ecom-order-secure
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
    environment:
      SPRING_PROFILES_ACTIVE: "production,security"
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql-secure:3306/order_db?useSSL=true&requireSSL=true"
      SPRING_DATASOURCE_USERNAME: "${MYSQL_USER:-ecom_secure_user}"
      SPRING_DATASOURCE_PASSWORD: "${MYSQL_PASSWORD:-SecureUserP@ss123}"
      VAULT_TOKEN: "${VAULT_ROOT_TOKEN:-changeme}"
      VAULT_HOST: "vault"
      TRANSACTION_SECURITY_ENABLED: "true"
      FRAUD_DETECTION_ENABLED: "true"
      JAVA_OPTS: >
        -XX:+UseContainerSupport
        -XX:MaxRAMPercentage=75.0
        -Djava.security.egd=file:/dev/./urandom
        -Dspring.security.require-ssl=true
    networks:
      - ecom-secure
      - ecom-database
    depends_on:
      mysql-secure:
        condition: service_healthy
      vault:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Payment Service (Maximum Security)
  payment-secure:
    build:
      context: ./backend/payment-service
      dockerfile: Dockerfile.security
    container_name: ecom-payment-secure
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
    environment:
      SPRING_PROFILES_ACTIVE: "production,security,pci-compliant"
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql-secure:3306/payment_db?useSSL=true&requireSSL=true"
      SPRING_DATASOURCE_USERNAME: "${MYSQL_USER:-ecom_secure_user}"
      SPRING_DATASOURCE_PASSWORD: "${MYSQL_PASSWORD:-SecureUserP@ss123}"
      VAULT_TOKEN: "${VAULT_ROOT_TOKEN:-changeme}"
      VAULT_HOST: "vault"
      PCI_COMPLIANCE_MODE: "true"
      ENCRYPTION_AT_REST: "true"
      HMAC_VERIFICATION_ENABLED: "true"
      JAVA_OPTS: >
        -XX:+UseContainerSupport
        -XX:MaxRAMPercentage=75.0
        -Djava.security.egd=file:/dev/./urandom
        -Dspring.security.require-ssl=true
        -Dcom.sun.net.ssl.checkRevocation=true
    networks:
      - ecom-secure
      - ecom-database
    depends_on:
      mysql-secure:
        condition: service_healthy
      vault:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # === SECURITY MONITORING ===
  
  # Security Event Collector
  security-monitor:
    image: fluent/fluent-bit:2.2
    container_name: ecom-security-monitor
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=50m
    volumes:
      - ./config/fluent-bit/security.conf:/fluent-bit/etc/fluent-bit.conf:ro
      - /var/log:/var/log:ro
      - security_logs:/var/log/security:rw
    networks:
      - ecom-secure
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

volumes:
  # Persistent storage with security labels
  vault_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data/vault
  vault_logs:
    driver: local
  mysql_data_secure:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data/mysql
  mysql_logs:
    driver: local
  redis_data:
    driver: local
  security_logs:
    driver: local

# === DOCKER COMPOSE SECURITY CONFIGURATIONS ===
# This file provides maximum security hardening for production deployment
# Key security features:
# 1. Network isolation with custom subnets
# 2. Container hardening (no-new-privileges, cap_drop, read_only)
# 3. Secrets management via environment variables
# 4. Resource limits and health checks
# 5. Security-focused logging
# 6. SSL/TLS everywhere
# 7. PCI compliance for payment processing