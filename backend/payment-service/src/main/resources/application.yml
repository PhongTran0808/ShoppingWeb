server:
  port: 8084

spring:
  application:
    name: payment-service
  cloud:
    vault:
      enabled: false
  datasource:
    url: jdbc:mysql://localhost:3306/payment_db?useSSL=false&serverTimezone=UTC
    username: ecomuser
    password: ecompassword
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
